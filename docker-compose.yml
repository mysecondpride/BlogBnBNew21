version: '3.8'

services:
  mongo:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./app.js
    container_name: node-backend
    ports:
      - "3000:3000"
    depends_on:
      - mongo

volumes:
  mongo_data:
